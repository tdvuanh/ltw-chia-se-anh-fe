server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Nén gzip cho tài nguyên tĩnh
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Cache tài nguyên có hash tên file
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: mọi route do React Router xử lý
    location / {
        try_files $uri $uri/ /index.html;
    }
}
